<!DOCTYPE html>
<html>
<head>
    <title>Login - AI Travel Planner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="login-container">
    <h2>Login to AI Travel Planner</h2>

    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>

    <p style="margin-top:10px; font-size:13px;">
        New user? <span onclick="register()" style="cursor:pointer;color:#22d3ee;">Register</span>
    </p>

    <p id="message"></p>
</div>

</body>

<style>
body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:
        radial-gradient(circle at top left, #0b1120, #020617 55%, #020617 100%);
    color: #e5e7eb;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* Login Box */
.login-container {
    background: radial-gradient(circle at top left, #020617, #020617 40%, #020617);
    padding: 36px 32px 32px;
    width: 360px;
    border-radius: 20px;
    text-align: center;
    color: #e5e7eb;
    box-shadow:
        0 24px 60px rgba(15, 23, 42, 0.85),
        0 0 0 1px rgba(148, 163, 184, 0.55);
}

.login-container h2 {
    margin-bottom: 22px;
    font-size: 22px;
    letter-spacing: -0.02em;
    background: linear-gradient(120deg, #4f46e5, #22d3ee);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

input {
    width: 100%;
    padding: 11px 12px;
    margin: 9px 0;
    border-radius: 10px;
    border: 1px solid #1f2937;
    background: #020617;
    color: #e5e7eb;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease,
        transform 0.1s ease;
}

input::placeholder {
    color: #6b7280;
}

input:focus {
    border-color: #4f46e5;
    background: #020617;
    box-shadow: 0 0 0 1px rgba(79, 70, 229, 0.6), 0 12px 30px rgba(15, 23, 42, 0.7);
    transform: translateY(-1px);
}

button {
    width: 100%;
    padding: 11px;
    background: radial-gradient(circle at top left, #4f46e5, #22c55e);
    border: none;
    border-radius: 999px;
    color: white;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    margin-top: 10px;
    box-shadow: 0 20px 40px rgba(34, 197, 94, 0.4);
    transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.15s ease;
}

button:hover {
    transform: translateY(-1px);
    box-shadow: 0 22px 55px rgba(34, 197, 94, 0.55);
    opacity: 0.97;
}

button:active {
    transform: translateY(0);
    box-shadow: 0 14px 32px rgba(34, 197, 94, 0.45);
}

#message {
    margin-top: 14px;
    font-size: 13px;
}
</style>

<script>
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const params = new URLSearchParams(window.location.search);
    const rawNext = params.get("next");
    const next = rawNext && rawNext.startsWith("/") ? rawNext : "/trip";

    const response = await fetch("/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
    });

    const data = await response.json();
    const message = document.getElementById("message");

    if (response.status === 200) {
        message.style.color = "lightgreen";
        message.innerText = data.message;

        setTimeout(() => {
            window.location.href = next;
        }, 1500);
    } else {
        message.style.color = "red";
        message.innerText = data.message;
    }
}

async function register() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const response = await fetch("/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
    });

    const data = await response.json();
    const message = document.getElementById("message");

    if (response.status === 200) {
        message.style.color = "lightgreen";
    } else {
        message.style.color = "red";
    }

    message.innerText = data.message;
}
</script>

</html>
